<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logint</title>
    <link rel="stylesheet" href="/css/index.css">
</head>

<body>
    <div class="main-section">
        <div class="curls-container">
            <svg class="curls" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Flowing curly lines spanning across the screen -->
                <path class="curl-line" d="M-100,60 C300,200 600,-50 900,100 C1200,250 1500,0 1800,100" fill="none" stroke="#A7C7C2" stroke-width="2" />
                <path class="curl-line" d="M-100,100 C320,240 620,-10 920,140 C1220,290 1520,40 1820,140" fill="none" stroke="#A7C7C2" stroke-width="2" />
                <path class="curl-line" d="M-100,140 C340,280 640,30 940,180 C1240,330 1540,80 1840,180" fill="none" stroke="#A7C7C2" stroke-width="2" />
                <path class="curl-line" d="M-100,180 C360,320 660,70 960,220 C1260,370 1560,120 1860,220" fill="none" stroke="#A7C7C2" stroke-width="2" />
                <path class="curl-line" d="M-100,220 C380,360 680,110 980,260 C1280,410 1580,160 1880,260" fill="none" stroke="#A7C7C2" stroke-width="2" />
            </svg>
        </div>
        <div class="section-left">
            <img src="/uploads/model-login.png" alt="" id="poster-img">
            <div class="div-shader"></div>
        </div>
        <div class="section-right">
            <h1>Aurea Beauty</h1>
            <form action="" method="post">
                <h2 id="title-login-form">Login</h2>
                <span id="icon-user"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="#000000"
                        aria-hidden="true" id="User--Streamline-Heroicons" height="26" width="26">
                        <path fill-rule="evenodd"
                            d="M5 4a3 3 0 1 1 6 0 3 3 0 0 1 -6 0ZM2.5006666666666666 13.403333333333332a5.5 5.5 0 0 1 10.998666666666667 0 0.5 0.5 0 0 1 -0.29133333333333333 0.46333333333333326A12.455333333333332 12.455333333333332 0 0 1 8 15c-1.8573333333333333 0 -3.622 -0.4053333333333333 -5.208 -1.1333333333333333a0.5 0.5 0 0 1 -0.29133333333333333 -0.46333333333333326Z"
                            clip-rule="evenodd" stroke-width="0.6667"></path>
                    </svg></span>
                <input type="text" placeholder="Nome" name="username" id="input-name">

                <span id="icon-pasword"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                        id="Lock-5--Streamline-Ultimate" height="24" width="24">
                        <path d="M4.5 16.03a7.5 7.5 0 1 0 15 0 7.5 7.5 0 1 0 -15 0" fill="none" stroke="#000000"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>
                        <path d="M10.5 16.03a1.5 1.5 0 1 0 3 0 1.5 1.5 0 1 0 -3 0" fill="none" stroke="#000000"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>
                        <path d="M17.5 10.937V6.03a5.5 5.5 0 0 0 -11 0v4.907" fill="none" stroke="#000000"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>
                    </svg></span>
                <input type="password" placeholder="Senha" name="password" id="input-password">
                <p id="text-pr-cad">Não tem uma conta? <a href="cadastro.html" id="link-cadastro">Cadastre-se</a></p>

                <div class="btns-logins-line">
                    <button id="login-google"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            id="Google-Icon--Streamline-Svg-Logos" height="24" width="24">
                            <path fill="#4285f4"
                                d="M23.5151 12.2611c0 -0.9661 -0.0784 -1.6711 -0.24805 -2.4022H12.2351v4.3605h6.4755c-0.1305 1.08365 -0.8355 2.7156 -2.4022 3.8122l-0.02195 0.146 3.4881 2.702175 0.24165 0.024125c2.2194 -2.04975 3.4989 -5.0656 3.4989 -8.6428Z"
                                stroke-width="0.25"></path>
                            <path fill="#34a853"
                                d="M12.234975 23.75c3.17245 0 5.83575 -1.0445 7.7811 -2.8461L16.308275 18.031625c-0.9922 0.69195 -2.3239 1.175 -4.0733 1.175 -3.1072 0 -5.7444 -2.049675 -6.6845 -4.882725l-0.137775 0.0117L1.7857125 17.14255l-0.0474325 0.13185C3.670475 21.112725 7.639375 23.75 12.234975 23.75Z"
                                stroke-width="0.25"></path>
                            <path fill="#fbbc05"
                                d="M5.550625 14.3239c-0.248075 -0.7311 -0.391625 -1.5145 -0.391625 -2.3239 0 -0.8095 0.143575 -1.5928 0.378575 -2.3239l-0.006575 -0.1557L1.858565 6.66835l-0.120155 0.05715C0.9420575 8.3183 0.4851075 10.10695 0.4851075 12c0 1.89305 0.45695 3.6816 1.2533025 5.2744l3.812215 -2.9505Z"
                                stroke-width="0.25"></path>
                            <path fill="#eb4335"
                                d="M12.234975 4.7933c2.20635 0 3.69465 0.95305 4.5433 1.7495L20.094375 3.305C18.057775 1.41195 15.407425 0.25 12.234975 0.25 7.639375 0.25 3.670475 2.8872 1.73828 6.7255L5.537425 9.6761c0.95315 -2.83305 3.59035 -4.8828 6.69755 -4.8828Z"
                                stroke-width="0.25"></path>
                        </svg></button>
                </div>

            </form>
        </div>
</body>

</html>
